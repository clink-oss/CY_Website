<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的测试网页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f5f5f5;
        }

        .box {
            width: 400px;
            margin: auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #msg {
            margin-top: 20px;
            color: blue;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Hello World</h1>
        <p>这是我的第一个网页</p>

        <button onclick="showMsg()">点我</button>

        <div id="msg"></div>
    </div>

    <script>
        function showMsg() {
            document.getElementById("msg").innerHTML =
                "按钮被点击了！";
        }
    </script>

</body>
</html>
