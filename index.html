<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDTECH 医疗科技</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft YaHei",sans-serif;
}

body{
    background:#050816;
    color:white;
    overflow-x:hidden;
}

body::before{
    content:'';
    position:fixed;
    width:1200px;
    height:1200px;
    background:radial-gradient(circle,#00d4ff33,#0000);
    top:-300px;
    left:-300px;
    animation:move1 12s infinite alternate;
    z-index:-1;
}

body::after{
    content:'';
    position:fixed;
    width:1000px;
    height:1000px;
    background:radial-gradient(circle,#0066ff33,#0000);
    bottom:-300px;
    right:-300px;
    animation:move2 10s infinite alternate;
    z-index:-1;
}

@keyframes move1{
    from{transform:translate(0,0);}
    to{transform:translate(200px,150px);}
}

@keyframes move2{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-150px);}
}

header{
    position:fixed;
    width:100%;
    top:0;
    backdrop-filter:blur(20px);
    background:rgba(0,0,0,.3);
    border-bottom:1px solid rgba(255,255,255,.1);
    z-index:100;
}

.nav{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}

.logo{
    font-size:30px;
    font-weight:bold;
    color:#00d4ff;
}

.menu{
    display:flex;
    gap:30px;
}

.menu a{
    color:white;
    text-decoration:none;
}

.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:100px 20px;
}

.hero-content h1{
    font-size:70px;
    margin-bottom:20px;
    background:linear-gradient(90deg,#00d4ff,#4d8cff,#00e5ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero-content p{
    font-size:24px;
    color:#b0c4ff;
    max-width:900px;
    margin:auto;
    line-height:1.8;
}

.btn{
    margin-top:40px;
    display:inline-block;
    padding:18px 40px;
    border-radius:50px;
    background:linear-gradient(90deg,#00d4ff,#0066ff);
    color:white;
    text-decoration:none;
    font-size:18px;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-5px);
}

.section{
    max-width:1200px;
    margin:auto;
    padding:100px 20px;
}

.title{
    text-align:center;
    font-size:50px;
    margin-bottom:60px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:30px;
    transition:.4s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 30px #00d4ff55;
}

.card h3{
    color:#00d4ff;
    margin-bottom:15px;
}

.card p{
    color:#d0d0d0;
    line-height:1.8;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:30px;
    text-align:center;
}

.stat{
    background:rgba(255,255,255,.05);
    border-radius:20px;
    padding:40px;
}

.stat h2{
    font-size:50px;
    color:#00d4ff;
}

.stat p{
    margin-top:10px;
    color:#ccc;
}

footer{
    text-align:center;
    padding:50px;
    border-top:1px solid rgba(255,255,255,.1);
    color:#aaa;
}

.cursor{
    width:250px;
    height:250px;
    position:fixed;
    border-radius:50%;
    pointer-events:none;
    background:radial-gradient(circle,#00d4ff22,#0000);
    transform:translate(-50%,-50%);
    z-index:-1;
}
</style>
</head>

<body>

<div class="cursor"></div>

<header>
    <div class="nav">
        <div class="logo">MEDTECH</div>
        <div class="menu">
            <a href="#">首页</a>
            <a href="#">产品</a>
            <a href="#">方案</a>
            <a href="#">关于我们</a>
        </div>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>未来医疗科技</h1>
        <p>
            AI智能诊断 · 高精度医疗设备 · 数字化医疗生态
            <br>
            用科技守护每一次生命信号
        </p>

        <a href="#" class="btn">探索产品</a>
    </div>
</section>

<section class="section">
    <h2 class="title">核心产品</h2>

    <div class="cards">

        <div class="card">
            <h3>智能生命监测系统</h3>
            <p>
                实时采集心率、血氧、呼吸频率等关键数据，
                提供24小时连续医疗监护。
            </p>
        </div>

        <div class="card">
            <h3>AI影像分析平台</h3>
            <p>
                基于深度学习算法，
                快速识别病灶并辅助临床决策。
            </p>
        </div>

        <div class="card">
            <h3>远程医疗终端</h3>
            <p>
                实现高清视频会诊、
                实时数据同步与远程诊疗。
            </p>
        </div>

    </div>
</section>

<section class="section">
    <h2 class="title">全球服务数据</h2>

    <div class="stats">

        <div class="stat">
            <h2>100+</h2>
            <p>国家地区</p>
        </div>

        <div class="stat">
            <h2>3000+</h2>
            <p>合作医院</p>
        </div>

        <div class="stat">
            <h2>500万+</h2>
            <p>服务患者</p>
        </div>

        <div class="stat">
            <h2>99.99%</h2>
            <p>系统稳定性</p>
        </div>

    </div>
</section>

<footer>
    © 2026 MEDTECH Healthcare Technology
</footer>

<script>
const cursor=document.querySelector('.cursor');

document.addEventListener('mousemove',(e)=>{
    cursor.style.left=e.clientX+'px';
    cursor.style.top=e.clientY+'px';
});
</script>

</body>
</html>
